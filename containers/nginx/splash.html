<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zokai Station</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0c10;
            color: #e8e9ec;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Hero background — radial glow like presentation title slide */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 60% 50%, #1c2135 0%, #0f1219 60%, #0a0c10 100%);
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 32px;
            animation: fadeInUp 0.6s ease-out both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Bonsai Logo — transparent PNG, pre-tinted blue-grey */
        .bonsai {
            width: 240px;
            height: auto;
            margin-bottom: 1.5rem;
            opacity: 0.55;
            animation: gentlePulse 4s ease-in-out infinite;
        }
        @keyframes gentlePulse {
            0%, 100% { opacity: 0.45; transform: scale(1); }
            50%      { opacity: 0.60; transform: scale(1.02); }
        }

        /* Zokai Station gradient title */
        .logo {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-size: clamp(2.8rem, 6vw, 4.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #7eb8e0 0%, #5b8fb9 40%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 0.3em;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-weight: 400;
            color: #5b8fb9;
            margin-bottom: 2.5rem;
        }

        /* Spinner */
        .spinner-wrap {
            position: relative;
            width: 40px;
            height: 40px;
            margin: 0 auto 1.5rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(91, 143, 185, 0.15);
            border-top-color: #5b8fb9;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Status text */
        .status {
            font-size: 1rem;
            font-weight: 400;
            color: #8b8f99;
            margin-bottom: 0.5rem;
            transition: opacity 0.3s ease;
        }

        /* Subtle hint */
        .hint {
            font-size: 0.8rem;
            color: #5d6170;
            margin-top: 2rem;
            opacity: 0.7;
        }

        /* Progress dots */
        .progress {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .progress .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(91, 143, 185, 0.2);
            transition: background 0.4s ease;
        }
        .progress .dot.active {
            background: #5b8fb9;
        }

        /* Footer branding */
        .footer {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #5d6170;
            opacity: 0.5;
            letter-spacing: 0.1em;
        }
    </style>
</head>

        <div class="logo">Zokai Station</div>
        <div class="subtitle">Your Sovereign AI Workstation</div>
        <div class="spinner-wrap">
            <div class="spinner"></div>
        </div>
        <div class="status" id="status">Starting up…</div>
        <div class="progress" id="progress">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <!-- macOS: ~10-20s. Windows: 3-5 min (WSL2 + Docker Desktop filesystem overhead) -->
        <div class="hint">This usually takes 10–20 seconds (3–5 min on Windows)</div>
    </div>
    <div class="footer">ZOKAI™ STATION</div>

    <script>
        // Poll until VS Code is reachable through nginx
        let attempt = 0;
        const maxAttempts = 90; // Give up after ~3 minutes
        const messages = [
            'Starting up…',
            'Loading workspace…',
            'Initializing services…',
            'Almost ready…'
        ];
        const dots = document.querySelectorAll('.progress .dot');

        async function check() {
            attempt++;
            const msgIndex = Math.min(Math.floor(attempt / 3), messages.length - 1);
            document.getElementById('status').textContent = messages[msgIndex];

            // Update progress dots
            dots.forEach((d, i) => d.classList.toggle('active', i <= msgIndex));

            if (attempt > maxAttempts) {
                document.getElementById('status').textContent =
                    'Taking longer than expected. Try refreshing.';
                // Don't give up — keep polling at a slower rate
                // Windows containers may take >3 min on first startup
                setTimeout(check, 5000);
                return;
            }
            try {
                // Use redirect:'manual' so we can detect VS Code's 302→/login
                // without the browser following it and getting the splash again
                const res = await fetch('/?_t=' + Date.now(), {
                    redirect: 'manual',
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                // When VS Code is down: nginx returns 502 (this splash page)
                // When VS Code is up: nginx proxies and returns 302 (redirect to /login)
                //   → redirect:'manual' gives status 0 (opaque redirect) — that's our signal
                // Any status < 500 means nginx is successfully proxying to VS Code
                if (res.status < 500 || res.type === 'opaqueredirect') {
                    // Use replace('/') — clean URL that nginx proxies to vs-code
                    window.location.replace('/');
                    return;
                }
            } catch (e) { /* network error = not ready yet */ }
            setTimeout(check, 2000);
        }
        // Start polling after a brief initial wait
        setTimeout(check, 2000);
    </script>
