# Upstream servers (only core infrastructure that MUST be running)
upstream vs-code {
    server vs-code:8080;
}

# Note: ALL MCPs use resolver pattern in their location blocks
# This allows nginx to start regardless of which MCP containers are running

upstream service-discovery {
    server service-discovery:8005;
}

upstream config-service {
    server config-service:8006;
}

upstream qdrant {
    server qdrant:6333;
}

upstream redis {
    server redis:6379;
}


upstream workspace-manager {
    server workspace-manager:9000;
}

upstream secrets-manager {
    server secrets-manager:9001;
}

# WebSocket: conditionally set Connection header
# Only set to "upgrade" when client sends an Upgrade header (WebSocket)
# Otherwise keep default behavior for regular HTTP requests
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Main server block
server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

    # ── Startup Splash Page ────────────────────────────────────────────────
    # Serve a branded loading page instead of raw 502/503/504 errors
    # while code-server is still booting (~10s). Auto-retries via JS polling.
    error_page 502 503 504 /startup.html;
    location = /startup.html {
        internal;
        alias /etc/nginx/splash.html;
        add_header Content-Type "text/html; charset=utf-8";
        add_header Cache-Control "no-store";
    }

    # ── Station Dashboard ────────────────────────────────────────────────
    # Static dashboard HTML (mounted at /etc/nginx/dashboard/dashboard.html)
    location = /dashboard {
        alias /etc/nginx/dashboard/dashboard.html;
        add_header Content-Type "text/html; charset=utf-8";
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # ── Dashboard Assets (JS/CSS modules) ──────────────────────────────────
    # Serves modular JS and CSS files from the dashboard directory
    location /dashboard/ {
        alias /etc/nginx/dashboard/;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # ── Hello World Test Page ─────────────────────────────────────────────
    location = /test {
        alias /etc/nginx/dashboard/test.html;
        add_header Content-Type "text/html; charset=utf-8";
        add_header Cache-Control "no-cache";
    }

    # URL opener relay proxy (same-origin, no CORS issues)
    # Proxies to url-relay.py running inside vs-code container
    location /api/open-url {
        resolver 127.0.0.11 valid=10s;
        set $url_relay http://vs-code:18099;
        proxy_pass $url_relay/open$is_args$args;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }

    # WYSIWYG Markdown Viewer toggle relay (titlebar eye icon)
    location /api/vs-code/relay/wysiwyg-toggle {
        resolver 127.0.0.11 valid=10s;
        set $url_relay http://vs-code:18099;
        proxy_pass $url_relay/wysiwyg-toggle$is_args$args;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }

    # Kilo prompt relay — writes kilo-prompt.json directly inside vs-code container
    location /api/vs-code/relay/kilo-prompt {
        resolver 127.0.0.11 valid=10s;
        set $url_relay http://vs-code:18099;
        proxy_pass $url_relay/kilo-prompt;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }

    # Open workspace file in VS Code editor tab
    location /api/vs-code/relay/open-file {
        resolver 127.0.0.11 valid=10s;
        set $url_relay http://vs-code:18099;
        proxy_pass $url_relay/open-file;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }

    # Zen Mode Global Injector
    location = /zen-mode.js {
        alias /etc/nginx/dashboard/zen-mode.js;
        add_header Content-Type "application/javascript";
        add_header Cache-Control "no-cache";
    }

    # Qdrant emails collection info (total point count for dashboard counter)
    location = /api/emails-count {
        proxy_pass http://qdrant/collections/emails;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Qdrant emails scroll proxy (POST body from dashboard JS, read-only)
    location = /api/emails {
        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass http://qdrant/collections/emails/points/scroll;
        proxy_method POST;
        proxy_set_header Content-Type "application/json";
        # Body comes from dashboard JS (limit, offset, with_payload)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        proxy_set_header Host $host;
    }

    # Qdrant calendar collection count (total events)
    location = /api/calendar-count {
        proxy_pass http://qdrant/collections/calendar;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Qdrant calendar scroll proxy (POST body from dashboard JS, read-only)
    location = /api/calendar {
        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass http://qdrant/collections/calendar/points/scroll;
        proxy_method POST;
        proxy_set_header Content-Type "application/json";
        # Body comes from dashboard JS (limit, offset, with_payload)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        proxy_set_header Host $host;
    }

    # Tasks markdown file (read from shared workspace volume)
    location = /api/tasks {
        alias /workspaces/antigravity_tasks.md;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Calendar SSE stream — real-time event update notifications
    location = /api/calendar-events/stream {
        resolver 127.0.0.11 valid=30s;
        set $cal_http_upstream calendar-mcp:8007;
        proxy_pass http://$cal_http_upstream/events/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Calendar HTTP API for Dashboard — Event creation + Google Meet
    location /api/calendar-events/ {
        resolver 127.0.0.11 valid=30s;
        set $cal_http_upstream calendar-mcp:8007;
        rewrite ^/api/calendar-events/(.*) /$1 break;
        proxy_pass http://$cal_http_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # Gmail SSE stream — real-time draft update notifications
    location = /api/mail/drafts/stream {
        resolver 127.0.0.11 valid=30s;
        set $gmail_http_upstream gmail-mcp:8007;
        proxy_pass http://$gmail_http_upstream/drafts/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Gmail HTTP API for Dashboard — Draft Box & email body (WO-MAIL-5)
    location /api/mail/ {
        resolver 127.0.0.11 valid=30s;
        set $gmail_http_upstream gmail-mcp:8007;
        rewrite ^/api/mail/(.*) /$1 break;
        proxy_pass http://$gmail_http_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ── PWA Manifest Override ──────────────────────────────────────────────
    # Serve Zokai-branded manifest.json instead of code-server's default.
    # Overrides "name": "code-server" → "Zokai Station" in PWA install prompt.
    # Icons are already replaced at startup by start-vscode.sh (Pillow/PIL).
    location = /manifest.json {
        alias /etc/nginx/manifest.json;
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "no-cache";
    }

    # VS Code Server (primary service)
    # Based on official code-server reverse proxy docs
    location / {
        proxy_pass http://vs-code;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding gzip;

        # Allow large payloads — code-server sends heavy WebSocket frames
        # during extension loading and state sync (especially on Windows/first boot)
        client_max_body_size 500M;

        # Strip Origin header — code-server 4.x validates WebSocket Origin against
        # its own host:port. Since nginx proxies on a different port (80 → 8080),
        # the browser-sent Origin (e.g. localhost:8082) doesn't match → 403 Forbidden.
        proxy_set_header Origin "";

        # WebSocket transport
        proxy_http_version 1.1;
        proxy_buffering off;

        # TCP keepalive — prevents Cloudflare Tunnel from dropping idle WS connections
        proxy_socket_keepalive on;

        # Timeout settings (3600s = 1h, matches streaming/tool-call duration)
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # Splash page: intercept upstream errors while code-server boots
        proxy_intercept_errors on;
    }

    # MCP Services API endpoints
    location /api/mcp/ {
        proxy_pass http://service-discovery/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GPTR-MCP Service (uses resolver for soft-fail)
    location /api/gptr-mcp/ {
        resolver 127.0.0.11 valid=30s;
        set $gptr_upstream gptr-mcp:8000;
        proxy_pass http://$gptr_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Raindrop-MCP Service (optional - uses resolver for soft-fail)
    location /api/raindrop-mcp/ {
        resolver 127.0.0.11 valid=30s;
        set $raindrop_upstream raindrop-mcp:8001;
        proxy_pass http://$raindrop_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # YouTube-MCP Service (uses resolver for soft-fail)
    location /api/youtube-mcp/ {
        resolver 127.0.0.11 valid=30s;
        set $youtube_upstream youtube-mcp:8002;
        proxy_pass http://$youtube_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP-Tasks Service (uses resolver for soft-fail)
    location /api/mcp-tasks/ {
        resolver 127.0.0.11 valid=30s;
        set $mcptasks_upstream mcp-tasks:8010;
        proxy_pass http://$mcptasks_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Markdownify-MCP Service (uses resolver for soft-fail)
    location /api/markdownify-mcp/ {
        resolver 127.0.0.11 valid=30s;
        set $markdownify_upstream markdownify-mcp:8012;
        proxy_pass http://$markdownify_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GitHub-MCP Service (optional - uses resolver for soft-fail)
    location /api/github-mcp/ {
        resolver 127.0.0.11 valid=30s;
        set $github_upstream github-mcp:8004;
        proxy_pass http://$github_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Configuration Service
    location /api/config/ {
        proxy_pass http://config-service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Qdrant Vector Database
    location /api/qdrant/ {
        proxy_pass http://qdrant/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redis (internal use only)
    location /api/redis/ {
        # Redis should not be exposed directly
        deny all;
        return 403;
    }

    # Ollama LLM Service
    location /api/ollama/ {
        resolver 127.0.0.11 valid=30s;
        set $ollama_upstream ollama:11434;
        rewrite ^/api/ollama/(.*) /$1 break;
        proxy_pass http://$ollama_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Workspace Manager
    location /api/workspace/ {
        proxy_pass http://workspace-manager/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Kilo Bridge (Direct File-Drop)
    location /api/bridge/ {
        proxy_pass http://workspace-manager/bridge/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # OAuth Connect Flow (selectively exposed for Dashboard)
    location /api/auth/ {
        proxy_pass http://secrets-manager/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # OAuth callback receiver — proxies to the temp callback server on port 9002
    # Google redirects the user's browser here after consent; secrets-manager
    # temp server exchanges the code for tokens then shuts down.
    location /api/auth/callback {
        resolver 127.0.0.11 valid=30s;
        set $oauth_callback_upstream secrets-manager:9002;
        proxy_pass http://$oauth_callback_upstream/callback$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Secrets Manager (internal use only)
    location /api/secrets/ {
        # Secrets manager should not be exposed directly
        deny all;
        return 403;
    }

    # Ideas MCP SSE stream — real-time idea update notifications
    location = /api/ideas/stream {
        resolver 127.0.0.11 valid=30s;
        set $ideas_upstream ideas-mcp:8014;
        proxy_pass http://$ideas_upstream/ideas/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Ideas MCP Service (Pro tier: Ideas Board REST API)
    # Dashboard JS calls GET/POST/PUT/DELETE /api/ideas/ for Ideas Board tab.
    # Uses resolver pattern so nginx starts cleanly on free installs where ideas-mcp is absent.
    location /api/ideas/ {
        resolver 127.0.0.11 valid=30s;
        set $ideas_upstream ideas-mcp:8014;
        rewrite ^/api/ideas/(.*) /$1 break;
        proxy_pass http://$ideas_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            return 204;
        }
    }

    # Deep Index (Pro tier: gap-indexer) — health + status endpoint
    # Uses resolver pattern so nginx starts cleanly on free installs where gap-indexer is absent.
    # Dashboard JS polls /api/gap-indexer/health to determine Deep Index state.
    location /api/gap-indexer/ {
        resolver 127.0.0.11 valid=30s;
        set $gap_indexer_upstream gap-indexer:8013;
        rewrite ^/api/gap-indexer/(.*) /$1 break;
        proxy_pass http://$gap_indexer_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Status page
    location /status {
        proxy_pass http://service-discovery/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files (if any)
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ \.(env|log|conf)$ {
        deny all;
    }
}